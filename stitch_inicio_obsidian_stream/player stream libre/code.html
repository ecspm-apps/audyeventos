<script>
        // Simple Interaction: Toggle Like state
        const likeBtn = document.querySelector('button:has(span[data-icon="favorite"])');
        let liked = true;
        
        likeBtn.addEventListener('click', () => {
            liked = !liked;
            const icon = likeBtn.querySelector('span');
            if (liked) {
                icon.style.fontVariationSettings = "'FILL' 1";
                likeBtn.classList.remove('bg-surface-container');
                likeBtn.classList.add('bg-primary', 'text-on-primary');
            } else {
                icon.style.fontVariationSettings = "'FILL' 0";
                likeBtn.classList.add('bg-surface-container');
                likeBtn.classList.remove('bg-primary', 'text-on-primary');
            }
        });

        // Simple visibility toggle for video controls
        const videoContainer = document.querySelector('.video-container');
        const overlay = videoContainer.querySelector('.absolute.inset-0');
        let timer;

        videoContainer.addEventListener('mousemove', () => {
            overlay.style.opacity = '1';
            clearTimeout(timer);
            timer = setTimeout(() => {
                overlay.style.opacity = '0';
            }, 3000);
        });

        videoContainer.addEventListener('touchstart', () => {
            overlay.style.opacity = '1';
            clearTimeout(timer);
            timer = setTimeout(() => {
                overlay.style.opacity = '0';
            }, 3000);
        });
    </script>
