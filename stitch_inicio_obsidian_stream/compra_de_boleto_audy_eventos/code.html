<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>

                        "error": "#ffb4ab",

                        "surface-container-lowest": "#0e0e0e",
                        "error-container": "#93000a",
                        "surface-container-highest": "#353534",
                        "on-primary-fixed-variant": "#004493",

                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "30px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                }
            }

<body class="bg-background text-on-background min-h-screen flex flex-col pb-24">
<!-- Top AppBar (Back only for task-focus) -->
<header class="fixed top-0 w-full z-50 bg-background/60 backdrop-blur-3xl border-b border-on-surface/10 flex items-center px-margin-mobile h-16">
<button aria-label="Volver" class="flex items-center justify-center w-10 h-10 rounded-full active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="ml-4 font-headline-md text-headline-md font-bold tracking-tight text-on-background">Ticket Premium</h1>
</header>
<main class="flex-1 mt-16 overflow-y-auto no-scrollbar">
<!-- Hero Section -->
<div class="relative w-full aspect-[16/11] overflow-hidden">
<img alt="Ministerio JAYAMARA" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/AP1WRLtZb_8hbwlFDDDGE9vYPkFilPZFcDNzlhpjaett_MhU8bloSmuN4ZtuLOT7Nx06F2-ovA0di-7D5JShMWhJHmY9cM7XnKs-oVSBMCXmiVYUmcfGSCgODpuk0__0QD3WyM-wQo29u4K-mijQg56t84yoTkeE3S5Cy6cmsNPPtKR_9TeJ4iXH4270j3Ol3waugYE4mMf7sJlQgm3cbvnYpCBbrFRihnzlTtA0H_DnRq2fq82M7tLQiNBEyKY"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
</div>
<div class="px-margin-mobile -mt-12 relative z-10 space-y-stack-lg">
<!-- Event Header -->
<div class="space-y-stack-sm">
<div class="inline-flex items-center px-3 py-1 rounded-full bg-primary-container/20 border border-primary/30">
<span class="material-symbols-outlined text-[14px] text-primary mr-2" style="font-variation-settings: 'FILL' 1;">movie_filter</span>
<span class="font-label-sm text-label-sm text-primary uppercase">Transmisión en Vivo</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background">Ministerio JAYAMARA desde Oruro</h2>
<div class="flex flex-col gap-1 text-on-surface-variant">
<div class="flex items-center">
<span class="material-symbols-outlined text-[18px] mr-2">location_on</span>
<span class="font-body-md text-body-md">Streaming HD - Plataforma Audy</span>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-[18px] mr-2">calendar_today</span>
<span class="font-body-md text-body-md">Sábado 24 de Julio • 20:00 (GMT-4)</span>
</div>
</div>
</div>
<!-- Ticket Selection Area -->
<div class="glass-panel p-gutter rounded-xl flex items-center justify-between">
<div>
<h3 class="font-headline-md text-headline-md text-on-background">Ticket General</h3>
<p class="font-body-md text-body-md text-primary font-semibold">50 Bs <span class="text-on-surface-variant font-normal">/ unidad</span></p>
</div>
<div class="flex items-center bg-surface-container rounded-lg p-1 border border-white/5">
<button class="w-10 h-10 flex items-center justify-center text-on-surface active:bg-white/10 rounded-lg transition-colors" id="minus-btn">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="w-12 text-center font-headline-md text-headline-md" id="ticket-count">1</span>
<button class="w-10 h-10 flex items-center justify-center text-on-surface active:bg-white/10 rounded-lg transition-colors" id="plus-btn">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Payment Method Selection -->
<div class="space-y-stack-md">
<h3 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider px-1">Método de Pago</h3>
<div class="grid gap-stack-md">
<!-- QR Option -->
<div class="relative">
<input checked="" class="hidden" id="qr" name="payment" type="radio"/>
<label class="flex items-center p-gutter glass-panel rounded-xl cursor-pointer transition-all border border-transparent" for="qr">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-surface-container-high text-on-surface mr-4">
<span class="material-symbols-outlined">qr_code_2</span>
</div>
<div class="flex-1">
<p class="font-label-md text-label-md text-on-background">Código QR (Simple)</p>
<p class="text-[12px] text-on-surface-variant">Pago inmediato vía app bancaria</p>
</div>
<div class="w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center">
<div class="radio-dot w-2.5 h-2.5 rounded-full bg-primary opacity-0 transition-opacity"></div>
</div>
</label>
</div>
<!-- Card Option -->
<div class="relative">
<input class="hidden" id="card" name="payment" type="radio"/>
<label class="flex items-center p-gutter glass-panel rounded-xl cursor-pointer transition-all border border-transparent" for="card">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-surface-container-high text-on-surface mr-4">
<span class="material-symbols-outlined">credit_card</span>
</div>
<div class="flex-1">
<p class="font-label-md text-label-md text-on-background">Tarjeta Débito/Crédito</p>
<p class="text-[12px] text-on-surface-variant">Visa, Mastercard, Amex</p>
</div>
<div class="w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center">
<div class="radio-dot w-2.5 h-2.5 rounded-full bg-primary opacity-0 transition-opacity"></div>
</div>
</label>
</div>
<!-- Tigo Money -->
<div class="relative">
<input class="hidden" id="tigo" name="payment" type="radio"/>
<label class="flex items-center p-gutter glass-panel rounded-xl cursor-pointer transition-all border border-transparent" for="tigo">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-surface-container-high text-on-surface mr-4">
<span class="material-symbols-outlined">account_balance_wallet</span>
</div>
<div class="flex-1">
<p class="font-label-md text-label-md text-on-background">Tigo Money</p>
<p class="text-[12px] text-on-surface-variant">Billetera móvil nacional</p>
</div>
<div class="w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center">
<div class="radio-dot w-2.5 h-2.5 rounded-full bg-primary opacity-0 transition-opacity"></div>
</div>
</label>
</div>
</div>
</div>
<!-- Summary Section -->
<div class="space-y-stack-sm pt-4">
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
<span>Subtotal</span>
<span id="subtotal">50 Bs</span>
</div>
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
<span>Comisión de servicio</span>
<span>0 Bs</span>
</div>
<div class="h-px bg-on-surface/10 my-2"></div>
<div class="flex justify-between font-headline-md text-headline-md text-on-background">
<span>Total</span>
<span class="text-primary" id="total">50 Bs</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 w-full p-margin-mobile glass-panel border-t-0 z-50">
<button class="w-full h-14 bg-primary text-on-primary font-bold rounded-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 600;">shopping_cart_checkout</span>
<span class="uppercase tracking-widest font-label-md text-label-md">COMPRAR AHORA</span>
</button>
</div>
<script>
        const plusBtn = document.getElementById('plus-btn');
        const minusBtn = document.getElementById('minus-btn');
        const countDisplay = document.getElementById('ticket-count');
        const subtotalDisplay = document.getElementById('subtotal');
        const totalDisplay = document.getElementById('total');
        
        let count = 1;
        const price = 50;

        function updateTotals() {
            countDisplay.innerText = count;
            const finalPrice = count * price;
            subtotalDisplay.innerText = `${finalPrice} Bs`;
            totalDisplay.innerText = `${finalPrice} Bs`;
        }

        plusBtn.addEventListener('click', () => {
            count++;
            updateTotals();
        });

        minusBtn.addEventListener('click', () => {
            if (count > 1) {
                count--;
                updateTotals();
            }
        });

        // Update radio styles visually (helper for non-form submission visuals)
        document.querySelectorAll('input[name="payment"]').forEach(radio => {
            radio.addEventListener('change', () => {
                document.querySelectorAll('.radio-dot').forEach(dot => dot.classList.add('opacity-0'));
                const checkedLabel = document.querySelector(`label[for="${radio.id}"]`);
                checkedLabel.querySelector('.radio-dot').classList.remove('opacity-0');
            });
        });
        
        // Init first radio dot
        document.querySelector('input[name="payment"]:checked').dispatchEvent(new Event('change'));
    </script>
</body></html>
